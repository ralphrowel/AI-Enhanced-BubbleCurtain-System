services:
  db:
    image: postgres:15
    container_name: bubblecurtain_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: bubblecurtain_redis
    ports:
      - "6379:6379"


  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bubblecurtain_web
    env_file:
      - .env
    command: >
      sh -c "
       sleep 5 &&
       python manage.py migrate &&
       python manage.py collectstatic --noinput &&
       daphne -b 0.0.0.0 -p 8000 backend.asgi:application"
    volumes:
      - ..:/app
      - ../mediafiles:/app/mediafiles  # ← correct place, under web service
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

volumes:
  postgres_data: 