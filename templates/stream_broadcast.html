<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Broadcasting — BubbleCurtain</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0f1a;
            color: #c8d6e5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #0f1923;
            border-bottom: 1px solid #1a2a3a;
        }
        .title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #00ccff; }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #334; display: inline-block; margin-right: 6px;
            transition: background 0.3s;
        }
        .status-dot.live { background: #ff3333; box-shadow: 0 0 8px #ff3333; animation: pulse 1.5s infinite; }
        .status-dot.connected { background: #00cc66; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
        .status-text { font-size: 12px; font-weight: 600; }

        .camera-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 400px;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }

        .overlay {
            position: absolute;
            top: 12px; left: 12px;
            background: rgba(255,51,51,0.9);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 4px 10px;
            border-radius: 4px;
            display: none;
        }
        .overlay.show { display: block; }

        .placeholder {
            text-align: center;
            color: #334;
            padding: 20px;
            position: absolute;
        }
        .placeholder .icon { font-size: 48px; margin-bottom: 12px; }
        .placeholder p { font-size: 13px; letter-spacing: 1px; }

        .bottom-bar {
            display: flex;
            gap: 10px;
            padding: 16px 16px 32px;
            background: #0f1923;
            border-top: 1px solid #1a2a3a;
            flex-direction: column;
        }
        .room-info {
            text-align: center;
            font-size: 12px;
            color: #556;
        }
        .room-info span { color: #00ccff; font-weight: 700; }
        .btn {
            flex: 1;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.15s;
        }
        .btn-start { background: #00ccff; color: #000; }
        .btn-start:active { background: #00aadd; }
        .btn-stop { background: #ff3333; color: #fff; display: none; }
        .btn-switch {
            background: #1a3a4a;
            color: #00ccff;
            font-size: 20px;
            width: 48px;
            flex: none;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-row { display: flex; gap: 10px; }

        .log {
            padding: 8px 16px;
            background: #080c15;
            font-size: 11px;
            color: #445;
            border-top: 1px solid #1a2a3a;
            min-height: 32px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="title">📡 Broadcast</span>
        <div>
            <span class="status-dot" id="dot"></span>
            <span class="status-text" id="statusText">Idle</span>
        </div>
    </div>

    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay" id="liveOverlay">● LIVE</div>
        <div class="placeholder" id="placeholder">
            <div class="icon">📷</div>
            <p>Tap START BROADCAST below</p>
        </div>
    </div>

    <div class="log" id="log">Waiting...</div>

    <div class="bottom-bar">
        <div class="room-info">Room: <span>{{ room_name }}</span> — Share this room name with your laptop viewer</div>
        <div class="btn-row">
            <button class="btn btn-start" id="btnStart">Start Broadcast</button>
            <button class="btn btn-stop" id="btnStop">Stop</button>
            <button class="btn-switch" id="btnSwitch">⇄</button>
        </div>
    </div>

    <script>
        const roomName = "{{ room_name }}";
        const wsUrl = `ws://${location.host}/ws/stream/${roomName}/`;

        let ws, localStream, pc;
        let useFront = false;

        const video = document.getElementById('video');
        const dot = document.getElementById('dot');
        const statusText = document.getElementById('statusText');
        const liveOverlay = document.getElementById('liveOverlay');
        const placeholder = document.getElementById('placeholder');
        const btnStart = document.getElementById('btnStart');
        const btnStop = document.getElementById('btnStop');
        const btnSwitch = document.getElementById('btnSwitch');
        const log = document.getElementById('log');

        const iceConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        function setLog(msg) { log.textContent = msg; }
        function setStatus(text, state) {
            statusText.textContent = text;
            dot.className = 'status-dot' + (state ? ' ' + state : '');
        }

        async function startBroadcast() {
            setLog('Accessing camera...');
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: useFront ? 'user' : 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: true,
                });
            } catch(e) {
                setLog('Camera error: ' + e.message);
                return;
            }

            video.srcObject = localStream;
            placeholder.style.display = 'none';
            liveOverlay.classList.add('show');
            btnStart.style.display = 'none';
            btnStop.style.display = 'block';
            setStatus('Connecting...', '');
            setLog('Connecting to signaling server...');

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                setLog('Connected. Waiting for viewer...');
                setStatus('Waiting', 'connected');
            };

            ws.onmessage = async (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === 'viewer-ready') {
                    setLog('Viewer connected! Starting WebRTC...');
                    setStatus('Live', 'live');
                    await createOffer();
                } else if (msg.type === 'answer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(msg));
                    setLog('Stream established ✓');
                } else if (msg.type === 'candidate') {
                    try { await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch(e) {}
                } else if (msg.type === 'peer-left') {
                    setLog('Viewer disconnected.');
                    setStatus('Waiting', 'connected');
                    if (pc) { pc.close(); pc = null; }
                }
            };

            ws.onclose = () => {
                setLog('Disconnected from server.');
                setStatus('Idle', '');
            };
        }

        async function createOffer() {
            pc = new RTCPeerConnection(iceConfig);
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    ws.send(JSON.stringify({ type: 'candidate', candidate: e.candidate }));
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({ type: 'offer', sdp: pc.localDescription.sdp }));
            setLog('Offer sent, waiting for answer...');
        }

        function stopBroadcast() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (pc) { pc.close(); pc = null; }
            if (ws) ws.close();
            video.srcObject = null;
            placeholder.style.display = 'block';
            liveOverlay.classList.remove('show');
            btnStart.style.display = 'block';
            btnStop.style.display = 'none';
            setStatus('Idle', '');
            setLog('Broadcast stopped.');
        }

        btnStart.addEventListener('click', startBroadcast);
        btnStop.addEventListener('click', stopBroadcast);
        btnSwitch.addEventListener('click', async () => {
            useFront = !useFront;
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: useFront ? 'user' : 'environment' },
                    audio: true,
                });
                video.srcObject = localStream;
                if (pc) {
                    const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) sender.replaceTrack(localStream.getVideoTracks()[0]);
                }
            }
        });
    </script>
</body>
</html>
