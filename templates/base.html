<!doctype html>
<html>
    <head>
        <title>BubbleCurtain System</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            .back-btn {
                color: #fff;
                text-decoration: none;
                font-size: 14px;
                opacity: 0.8;
                transition: opacity 0.15s;
            }
            .back-btn:hover { opacity: 1; color: #fff; }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-dark bg-dark px-3">
            <a href="/" class="navbar-brand">BubbleCurtain</a>
            <div class="d-flex gap-3 align-items-center">
                <a href="javascript:history.back()" class="back-btn">&larr; Back</a>
                <a href="/admin/" class="back-btn">Admin</a>
                <a href="/capture/" class="back-btn">Capture</a>
            </div>
        </nav>
        <div class="container mt-5"> {% block content %}{% endblock %} </div>
    </body>
</html>
